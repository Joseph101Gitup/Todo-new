{% extends 'todo_app/base.html' %}

{% block title %}Delete Task - To-Do App{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center min-vh-75">
    <div class="col-md-5">
        <div class="premium-card p-5 glass animate-fade-in text-center border-danger-subtle">
            <div class="fs-1 mb-4">⚠️</div>
            <h2 class="fw-800 mb-3" style="font-family: 'Outfit', sans-serif;">Confirm Deletion</h2>
            <p class="text-muted mb-5 fs-5">Are you sure you want to permanently delete <br><span
                    class="fw-bold text-dark">"{{ task.title }}"</span>?</p>
            <form method="post">
                {% csrf_token %}
                <div class="d-flex flex-column gap-3">
                    <button type="submit" class="btn btn-danger py-3 rounded-3 fw-bold shadow-sm">Yes, Delete This
                        Task</button>
                    <a href="{% url 'task_list' %}" class="btn btn-outline-secondary py-3 border-2 rounded-3 fw-600">No,
                        Keep It</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
