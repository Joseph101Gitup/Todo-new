{% extends 'todo_app/base.html' %}

{% block title %}Login - To-Do App{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center min-vh-75">
    <div class="col-md-5">
        <div class="premium-card p-5 glass animate-fade-in">
            <div class="text-center mb-5">
                <h2 class="fw-800 mb-2" style="font-family: 'Outfit', sans-serif;">Welcome Back</h2>
                <p class="text-muted">Sign in to manage your tasks</p>
            </div>
            <form method="post">
                {% csrf_token %}
                <div class="mb-4">
                    <label class="form-label fw-600 small text-uppercase" style="letter-spacing: 1px;">Username</label>
                    <input type="text" name="username" class="form-control form-control-premium" placeholder="Username"
                        required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-600 small text-uppercase" style="letter-spacing: 1px;">Password</label>
                    <input type="password" name="password" class="form-control form-control-premium"
                        placeholder="Password" required>
                </div>
                <button type="submit" class="btn-premium w-100 py-3 mt-3">Sign In Now</button>
            </form>
            <div class="text-center mt-5 pt-3 border-top">
                <p class="text-muted small">Don't have an account? <a href="{% url 'register' %}"
                        class="fw-bold text-primary text-decoration-none">Join To-Do Master</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
